<!DOCTYPE html>
<html>
<head>

<title>Purchase - RynexPE</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container{
max-width:500px;
margin:auto;
padding:40px;
}

input,select{

width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;

}

button{

width:100%;
padding:12px;
background:#22c55e;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;

}

</style>
</head>

<body>

<div class="container">

<h2>Complete Your Purchase</h2>

<form>

<label>Minecraft Username</label>
<input type="text" placeholder="Enter username" required>

<label>Minecraft Edition</label>
<select>

<option>Java</option>
<option>MCPE / Bedrock</option>

</select>

<label>Email</label>
<input type="email" placeholder="Enter email">

<label>Full Name</label>
<input type="text" placeholder="Enter name">

<label>Zip Code</label>
<input type="text" placeholder="Zip code">

<button>Proceed to Payment</button>

</form>

</div>

</body>
</html>
